site_name: Terefo Heal Reboa
site_description: A living research book about Hermes, OpenClaw, and loop engineering.
site_url: https://johveg.github.io/agent-research-book-pipeline/
repo_url: https://github.com/johveg/agent-research-book-pipeline
repo_name: johveg/agent-research-book-pipeline
edit_uri: edit/main/docs/
exclude_docs: |
  chapter-briefs/**
  entities/**
  operations/**
  research/**
  reports/**
  book/agent-runtime-security.md
  book/autonomous-research-pipeline.md
  book/browser-agents.md
theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Book:
      - Preface: book/preface.md
      - Introduction: book/introduction.md
      - Methodology: book/methodology.md
      - The Agent Loop: book/01-the-agent-loop.md
      - Hermes: book/02-hermes.md
      - OpenClaw: book/03-openclaw.md
      - Loop Engineering: book/04-loop-engineering.md
      - Context and Memory Architecture: book/05-context-memory-architecture.md
      - Operating Loops in Production: book/06-operating-loops.md
      - Open Questions: book/open-questions.md
  - Research Lanes:
      - Citation Pipeline: book/citation-pipeline.md
      - Coding Agents: book/coding-agents.md
      - Computer-Use Agents: book/computer-use-agents.md
      - Desktop AI Agents: book/desktop-ai-agents.md
      - Enterprise AI Agents: book/enterprise-ai-agents.md
      - Human Approval Workflow: book/human-approval-workflow.md
      - Local AI Agents: book/local-ai-agents.md
      - Local-First Agents: book/local-first-agents.md
      - MCP Tools: book/mcp-tools.md
      - Multi-Agent Workflows: book/multi-agent-workflows.md
      - Observability for Agents: book/observability-for-agents.md
      - Red Team Review: book/red-team-review.md
      - Self-Improving Agents: book/self-improving-agents.md
      - Source Registry: book/source-registry.md
